<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
    }
    button {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #1da1f2;
      color: white;
      font-weight: 500;
    }
    button:hover {
      background-color: #0c8bdf;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #555;
    }
  </style>
</head>
<body>
  <button id="toggleBtn">加载中...</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
